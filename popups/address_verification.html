<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verification Page | Teman Singgah</title>

    <link rel="icon" href="/assets/logo/logo_temansinggah.svg" />
    <link rel="stylesheet" href="/components/root.css" />
    <link rel="stylesheet" href="styles/address_verification.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet" />

    <script
      type="module"
      src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" />
  </head>

  <body>
    <main class="main-content">
      <section class="address-verification-card">
        <div class="verification-body-section">
          <i class="ph-fill ph-house"></i>
          <h2 class="verification-title">Login atau Masuk</h2>
          <p class="verification-address">Jl. Merdeka</p>
        </div>
        <div class="verification-footer-section">
          <button class="verification-confirm-button" type="submit">
            Ya, benar
          </button>
          <button class="verification-edit-button">Edit</button>
        </div>
      </section>
    </main>
  </body>
</html>
