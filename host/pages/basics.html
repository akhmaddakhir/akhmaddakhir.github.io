<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Dasar | Teman Singgah</title>
  <link rel="icon" href="/assets/logo/logo_temansinggah.svg" />
  <link rel="stylesheet" href="/styles/root.css" />
  <link rel="stylesheet" href="/host/onboarding.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script type="module" src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
</head>
<body class="onboarding-page">

  <header class="onboarding-header">
    <a href="/index.html" class="header-logo">
      <img src="/assets/logo/logo_temansinggah.svg" alt="Teman Singgah" />
    </a>
    <div class="header-actions">
      <button class="btn-ghost">Pertanyaan?</button>
      <button class="btn-ghost">Simpan &amp; keluar</button>
    </div>
  </header>

  <main class="main-content">
    <div class="page-header">
      <h1>Berikan beberapa detail dasar tentang tempat Anda</h1>
      <p>Anda dapat menambahkan detail lebih lanjut nanti, seperti tipe tempat tidur.</p>
    </div>

    <div class="counter-list">
      <div class="counter-row">
        <span class="counter-label">Tamu</span>
        <div class="counter-control">
          <button type="button" class="counter-btn">−</button>
          <span class="counter-value">4</span>
          <button type="button" class="counter-btn">+</button>
        </div>
      </div>
      <div class="counter-row">
        <span class="counter-label">Kamar tidur</span>
        <div class="counter-control">
          <button type="button" class="counter-btn">−</button>
          <span class="counter-value">2</span>
          <button type="button" class="counter-btn">+</button>
        </div>
      </div>
      <div class="counter-row">
        <span class="counter-label">Tempat tidur</span>
        <div class="counter-control">
          <button type="button" class="counter-btn">−</button>
          <span class="counter-value">2</span>
          <button type="button" class="counter-btn">+</button>
        </div>
      </div>
      <div class="counter-row">
        <span class="counter-label">Kamar mandi</span>
        <div class="counter-control">
          <button type="button" class="counter-btn">−</button>
          <span class="counter-value">1</span>
          <button type="button" class="counter-btn">+</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="onboarding-footer">
    <div class="progress-bar">
      <div class="progress-segment completed"></div>
      <div class="progress-segment"></div>
      <div class="progress-segment"></div>
    </div>
    <div class="footer-actions">
      <a href="location.html" class="btn-back">Kembali</a>
      <a href="stand_out.html" class="btn-next">Selanjutnya</a>
    </div>
  </footer>

</body>
</html>
