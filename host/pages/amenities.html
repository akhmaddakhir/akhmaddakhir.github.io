<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fasilitas | Teman Singgah</title>
  <link rel="icon" href="/assets/logo/logo_temansinggah.svg" />
  <link rel="stylesheet" href="/styles/root.css" />
  <link rel="stylesheet" href="/host/onboarding.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script type="module" src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
</head>
<body class="onboarding-page">

  <header class="onboarding-header">
    <a href="/index.html" class="header-logo">
      <img src="/assets/logo/logo_temansinggah.svg" alt="Teman Singgah" />
    </a>
    <div class="header-actions">
      <button class="btn-ghost">Pertanyaan?</button>
      <button class="btn-ghost">Simpan &amp; keluar</button>
    </div>
  </header>

  <main class="main-content wide">
    <div class="page-header">
      <h1>Ceritakan fasilitas yang Anda tawarkan</h1>
      <p>Pilih semua fasilitas yang tersedia. Anda selalu bisa menambah lebih banyak nanti.</p>
    </div>

    <div class="amenities-grid">
      <label class="amenity-item">
        <input type="checkbox" checked />
        <div class="amenity-card">
          <i class="ph-bold ph-wifi-high"></i>
          <span>Wi-Fi</span>
        </div>
      </label>
      <label class="amenity-item">
        <input type="checkbox" />
        <div class="amenity-card">
          <i class="ph-bold ph-television"></i>
          <span>TV</span>
        </div>
      </label>
      <label class="amenity-item">
        <input type="checkbox" checked />
        <div class="amenity-card">
          <i class="ph-bold ph-thermometer-hot"></i>
          <span>AC / Pendingin Ruangan</span>
        </div>
      </label>
      <label class="amenity-item">
        <input type="checkbox" />
        <div class="amenity-card">
          <i class="ph-bold ph-cooking-pot"></i>
          <span>Dapur</span>
        </div>
      </label>
      <label class="amenity-item">
        <input type="checkbox" />
        <div class="amenity-card">
          <i class="ph-bold ph-washing-machine"></i>
          <span>Mesin Cuci</span>
        </div>
      </label>
      <label class="amenity-item">
        <input type="checkbox" checked />
        <div class="amenity-card">
          <i class="ph-bold ph-car"></i>
          <span>Parkir Gratis</span>
        </div>
      </label>
      <label class="amenity-item">
        <input type="checkbox" />
        <div class="amenity-card">
          <i class="ph-bold ph-swimming-pool"></i>
          <span>Kolam Renang</span>
        </div>
      </label>
      <label class="amenity-item">
        <input type="checkbox" />
        <div class="amenity-card">
          <i class="ph-bold ph-first-aid-kit"></i>
          <span>Kotak P3K</span>
        </div>
      </label>
      <label class="amenity-item">
        <input type="checkbox" />
        <div class="amenity-card">
          <i class="ph-bold ph-fire-extinguisher"></i>
          <span>Alat Pemadam</span>
        </div>
      </label>
      <label class="amenity-item">
        <input type="checkbox" checked />
        <div class="amenity-card">
          <i class="ph-bold ph-shower"></i>
          <span>Shower Air Panas</span>
        </div>
      </label>
      <label class="amenity-item">
        <input type="checkbox" />
        <div class="amenity-card">
          <i class="ph-bold ph-desk"></i>
          <span>Ruang Kerja</span>
        </div>
      </label>
      <label class="amenity-item">
        <input type="checkbox" />
        <div class="amenity-card">
          <i class="ph-bold ph-dog"></i>
          <span>Ramah Hewan Peliharaan</span>
        </div>
      </label>
    </div>
  </main>

  <footer class="onboarding-footer">
    <div class="progress-bar">
      <div class="progress-segment completed"></div>
      <div class="progress-segment active"></div>
      <div class="progress-segment"></div>
    </div>
    <div class="footer-actions">
      <a href="stand_out.html" class="btn-back">Kembali</a>
      <a href="photos.html" class="btn-next">Selanjutnya</a>
    </div>
  </footer>

</body>
</html>
