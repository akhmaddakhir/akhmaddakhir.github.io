<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fasilitas | Teman Singgah</title>
    <link rel="icon" href="/assets/logo/logo_temansinggah.svg" />
    <link rel="stylesheet" href="/styles/root.css" />
    <link rel="stylesheet" href="/host/onboarding.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet" />
    <script
      type="module"
      src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
  </head>

  <body class="onboarding-page">
    <header class="onboarding-header">
      <nav class="onboarding-nav">
        <a href="/index.html" class="logo-section">
          <img
            src="/assets/logo/logo_temansinggah.svg"
            alt="Logo Teman Singgah"
            class="logo-icon" />
          <img
            src="/assets/logo/label_temansinggah.svg"
            alt="Brand Name Teman Singgah"
            class="logo-name" />
        </a>
        <div class="header-actions">
          <button class="ghost-button">Pertanyaan?</button>
          <button class="ghost-button">Simpan & keluar</button>
        </div>
      </nav>
    </header>

    <main class="main-content wide">
      <div class="page-header">
        <h2>Ceritakan fasilitas yang Anda tawarkan</h2>
        <p>
          Pilih semua fasilitas yang tersedia. Anda selalu bisa menambah lebih
          banyak nanti.
        </p>
      </div>

      <div class="amenities-grid">
        <label class="amenity-item">
          <input type="checkbox" checked />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-wifi-high"></i>
            </div>
            <span>Wi-Fi</span>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-television"></i>
            </div>
            <span>TV</span>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" checked />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-thermometer-hot"></i>
            </div>
            <span>AC / Pendingin Ruangan</span>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-cooking-pot"></i>
            </div>
            <span>Dapur</span>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-washing-machine"></i>
            </div>
            <span>Mesin Cuci</span>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" checked />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-car"></i>
            </div>
            <span>Parkir Gratis</span>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-swimming-pool"></i>
            </div>
            <span>Kolam Renang</span>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-first-aid-kit"></i>
            </div>
            <span>Kotak P3K</span>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-fire-extinguisher"></i>
            </div>
            <span>Alat Pemadam</span>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" checked />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-shower"></i>
            </div>
            <span>Shower Air Panas</span>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-desk"></i>
            </div>
            <span>Ruang Kerja</span>
          </div>
        </label>
        <label class="amenity-item">
          <input type="checkbox" />
          <div class="amenity-card">
            <div class="amenity-icon">
              <i class="ph-bold ph-dog"></i>
            </div>
            <span>Ramah Hewan Peliharaan</span>
          </div>
        </label>
      </div>
    </main>

    <footer class="onboarding-footer">
      <div class="progress-bar">
        <div class="progress-segment completed"></div>
        <div class="progress-segment"></div>
        <div class="progress-segment"></div>
      </div>
      <div class="footer-actions">
        <a href="stand_out.html" class="back-button">Kembali</a>
        <a href="photos.html" class="next-button">Selanjutnya</a>
      </div>
    </footer>
  </body>
</html>
