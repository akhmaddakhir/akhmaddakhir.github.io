<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pratinjau Foto | Teman Singgah</title>
  <link rel="icon" href="/assets/logo/logo_temansinggah.svg" />
  <link rel="stylesheet" href="/styles/root.css" />
  <link rel="stylesheet" href="/host/onboarding.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script type="module" src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
</head>
<body class="onboarding-page">

  <header class="onboarding-header">
    <a href="/index.html" class="header-logo">
      <img src="/assets/logo/logo_temansinggah.svg" alt="Teman Singgah" />
    </a>
    <div class="header-actions">
      <button class="btn-ghost">Tambah foto</button>
      <button class="btn-ghost">Simpan &amp; keluar</button>
    </div>
  </header>

  <main class="main-content wide">
    <div class="page-header" style="display:flex; align-items:flex-start; justify-content:space-between; gap: var(--space-16);">
      <div>
        <h1>Ta-da! Bagaimana tampilannya?</h1>
        <p>Foto pertama akan menjadi foto cover. Seret untuk mengurutkan ulang.</p>
      </div>
    </div>

    <div class="photo-grid">
      <div class="photo-item">
        <img src="https://placehold.co/960x540/8b2500/ffffff?text=Foto+Cover" alt="Cover" />
        <span class="photo-badge">Foto Cover</span>
        <div class="photo-remove"><i class="ph-bold ph-x"></i></div>
      </div>
      <div class="photo-item">
        <img src="https://placehold.co/600x450/c9933a/ffffff?text=Kamar+Tidur" alt="Kamar" />
        <div class="photo-remove"><i class="ph-bold ph-x"></i></div>
      </div>
      <div class="photo-item">
        <img src="https://placehold.co/600x450/7d2e0e/ffffff?text=Ruang+Tamu" alt="Ruang Tamu" />
        <div class="photo-remove"><i class="ph-bold ph-x"></i></div>
      </div>
      <div class="photo-item">
        <img src="https://placehold.co/600x450/6b4f3a/ffffff?text=Dapur" alt="Dapur" />
        <div class="photo-remove"><i class="ph-bold ph-x"></i></div>
      </div>
      <div class="photo-item">
        <img src="https://placehold.co/600x450/c0a090/ffffff?text=Kamar+Mandi" alt="Kamar Mandi" />
        <div class="photo-remove"><i class="ph-bold ph-x"></i></div>
      </div>
    </div>
  </main>

  <footer class="onboarding-footer">
    <div class="progress-bar">
      <div class="progress-segment completed"></div>
      <div class="progress-segment active"></div>
      <div class="progress-segment"></div>
    </div>
    <div class="footer-actions">
      <a href="photos.html" class="btn-back">Kembali</a>
      <a href="title.html" class="btn-next">Selanjutnya</a>
    </div>
  </footer>

</body>
</html>
