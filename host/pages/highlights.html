<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorotan Properti | Teman Singgah</title>
  <link rel="icon" href="/assets/logo/logo_temansinggah.svg" />

      </label>
      <label class="highlight-item">
        <input type="checkbox" checked />
        <span class="highlight-pill"><i class="ph-bold ph-plant"></i> Rustic &amp; alami</span>
      </label>
      <label class="highlight-item">
        <input type="checkbox" />
        <span class="highlight-pill"><i class="ph-bold ph-tree-palm"></i> Dekat alam</span>

        <input type="checkbox" />

      </label>
      <label class="highlight-item">
        <input type="checkbox" />
        <span class="highlight-pill"><i class="ph-bold ph-lightning"></i> Modern &amp; desain</span>
      </label>
      <label class="highlight-item">
        <input type="checkbox" />
        <span class="highlight-pill"><i class="ph-bold ph-peace"></i> Tenang &amp; privat</span>
      </label>
    </div>
  </main>

  <footer class="onboarding-footer">
    <div class="progress-bar">
      <div class="progress-segment completed"></div>
      <div class="progress-segment active"></div>
      <div class="progress-segment"></div>
    </div>
    <div class="footer-actions">
      <a href="title.html" class="btn-back">Kembali</a>
      <a href="description.html" class="btn-next">Selanjutnya</a>
    </div>
  </footer>
