<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tipe Tempat | Teman Singgah</title>
  <link rel="icon" href="/assets/logo/logo_temansinggah.svg" />
  <link rel="stylesheet" href="/styles/root.css" />
  <link rel="stylesheet" href="/host/onboarding.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script type="module" src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
</head>
<body class="onboarding-page">

  <header class="onboarding-header">
    <a href="/index.html" class="header-logo">
      <img src="/assets/logo/logo_temansinggah.svg" alt="Teman Singgah" />
    </a>
    <div class="header-actions">
      <button class="btn-ghost">Pertanyaan?</button>
      <button class="btn-ghost">Simpan &amp; keluar</button>
    </div>
  </header>

  <main class="main-content">
    <div class="page-header">
      <h1>Tamu akan mendapatkan tipe tempat yang mana?</h1>
    </div>

    <div class="option-list">
      <label class="option-item">
        <input type="radio" name="place-type" value="entire" checked />
        <div class="option-card">
          <div class="option-text">
            <h3>Seluruh tempat</h3>
            <p>Tamu memiliki akses penuh ke seluruh properti untuk diri mereka sendiri.</p>
          </div>
          <div class="option-icon"><i class="ph-bold ph-house-line"></i></div>
        </div>
      </label>

      <label class="option-item">
        <input type="radio" name="place-type" value="room" />
        <div class="option-card">
          <div class="option-text">
            <h3>Sebuah kamar</h3>
            <p>Tamu memiliki kamar pribadi di dalam rumah, plus akses ke area bersama.</p>
          </div>
          <div class="option-icon"><i class="ph-bold ph-door"></i></div>
        </div>
      </label>

      <label class="option-item">
        <input type="radio" name="place-type" value="shared" />
        <div class="option-card">
          <div class="option-text">
            <h3>Kamar bersama di hostel</h3>
            <p>Tamu tidur di kamar bersama di hostel yang dikelola profesional dengan staf 24/7.</p>
          </div>
          <div class="option-icon"><i class="ph-bold ph-users-three"></i></div>
        </div>
      </label>
    </div>
  </main>

  <footer class="onboarding-footer">
    <div class="progress-bar">
      <div class="progress-segment completed"></div>
      <div class="progress-segment"></div>
      <div class="progress-segment"></div>
    </div>
    <div class="footer-actions">
      <a href="category.html" class="btn-back">Kembali</a>
      <a href="location.html" class="btn-next">Selanjutnya</a>
    </div>
  </footer>

</body>
</html>
