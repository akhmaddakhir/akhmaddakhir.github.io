<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Step 2 - Tambah Foto | Teman Singgah</title>
  <link rel="icon" href="/assets/logo/logo_temansinggah.svg" />
  <link rel="stylesheet" href="/styles/root.css" />
  <link rel="stylesheet" href="/host/onboarding.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script type="module" src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
</head>
<body class="onboarding-page">
  <header class="onboarding-header">
    <a href="/index.html" class="header-logo"><img src="/assets/logo/logo_temansinggah.svg" alt="Teman Singgah" /></a>
    <div class="header-actions">
      <button class="btn-ghost">Pertanyaan?</button>
      <button class="btn-ghost">Simpan & keluar</button>
    </div>
  </header>

  <main class="main-content wide">
    <div class="page-header">
      <h1>Tambahkan beberapa foto properti Anda</h1>
      <p>Anda membutuhkan 5 foto untuk memulai. Anda dapat menambahkan lebih banyak atau mengubahnya nanti.</p>
    </div>

    <label class="photo-upload-area">
      <input type="file" accept="image/*" multiple />
      <div class="upload-icon"><i class="ph-bold ph-camera"></i></div>
      <span class="upload-text">Pilih dari perangkat Anda</span>
    </label>
  </main>

  <footer class="onboarding-footer">
    <div class="progress-bar">
      <div class="progress-segment completed"></div>
      <div class="progress-segment active"></div>
      <div class="progress-segment"></div>
    </div>
    <div class="footer-actions">
      <a href="stand_out.html" class="btn-back">Kembali</a>
      <a href="photos_preview.html" class="btn-next">Selanjutnya</a>
    </div>
  </footer>
</body>
</html>
